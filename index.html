<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SurveilRising</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<script>
(function () {
	function escapeQuotes(value) { return (value||"").replace(/"/g,"\\\""); }

	function normalizeText(value) {
		return (value||"").toString().normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
	}

	var sellerOptions = [
		"mazvigo", "magicbarcelona", "Devian-magic", "moria05", "manavortex",
		"TEMPEST-STORE", "willybizarre", "Itaca", "Metropolis-Center",
		"Distritozero-Bilbao", "Shark-Games", "Dario-malaga", "JupiterMadridNorte",
		"Onlycards", "DISTRITOZERO-TOLOSA", "Distritozero-San", "Distritozero-Valla",
		"distritozero-vitoria", "Eurekagames", "Sorcith", "DUAL-GAMES"
	];

	var sellerUserMap = {
		mazvigo:"Mazvigosl", magicbarcelona:"MagicBarcelona", "Devian-magic":"Devian-Magic-Cards",
		moria05:"Moria05", manavortex:"ManaVortex-POOL4YOU", "TEMPEST-STORE":"TEMPEST-STORE",
		willybizarre:"willybizarre", Itaca:"Itaca", "Metropolis-Center":"Metropolis-Center",
		"Distritozero-Bilbao":"Distritozero-Bilbao", "Shark-Games":"Shark-Games",
		"Dario-malaga":"Dario-malaga", JupiterMadridNorte:"JupiterMadridNorte",
		Onlycards:"Onlycards", "DISTRITOZERO-TOLOSA":"DISTRITOZERO-TOLOSA",
		"Distritozero-San":"Distritozero-San", "Distritozero-Valla":"Distritozero-Valla",
		"distritozero-vitoria":"distritozero-vitoria", Eurekagames:"Eurekagames",
		Sorcith:"Sorcith", "DUAL-GAMES":"DUAL-GAMES"
	};

	var finalListBySeller = {};
	var selectedCards = [];
	var lastRequestId = 0;
	var searchDebounce = null;
	var activePreviewKey = "";

	document.body.innerHTML = "";

	var layout = document.createElement("div");
	layout.className = "app-layout";

	var sidebar = document.createElement("aside");
	sidebar.className = "card-sidebar";
	sidebar.innerHTML =
		'<h2 class="sidebar-title">SurveilRising</h2>' +
		'<p class="sidebar-help">Busca las cartas en ingles y selecciona tu vendedor de confianza.</p>' +
		'<div class="search-row">' +
		'<input id="cardSearchInput" class="card-search" type="text" placeholder="Search card in English..." autocomplete="off" />' +
		'<div class="sidebar-actions">' +
		'<span id="cardCount"></span>' +
		'<button id="clearSearchButton" class="clear-selection" type="button">Limpiar</button>' +
		'</div>' +
		'</div>' +
		'<ul id="cardList" class="card-list"></ul>';

	var panel = document.createElement("main");
	panel.className = "table-area";
	panel.innerHTML =
		'<div class="builder-panel">' +
		'<h2 class="sidebar-title">Lista de compra</h2>' +
		'<p class="sidebar-help">Cada carta puede tener su vendedor. Pulsa AÑADIR en cada fila para anadirla a la lista final.</p>' +
		'<div id="selectedCardsContainer"></div>' +
		'<div class="export-actions">' +
		'<button id="clearAllButton" class="clear-selection" type="button">Vaciar lista</button>' +
		'</div>' +
		'<textarea id="exportOutput" class="export-output" placeholder="Aqui aparecera tu lista final..." readonly></textarea>' +
		'</div>';

	layout.appendChild(sidebar);
	layout.appendChild(panel);
	document.body.appendChild(layout);

	var imageOverlay = document.createElement("div");
	imageOverlay.className = "image-overlay";
	imageOverlay.innerHTML =
		'<div class="image-modal" role="dialog" aria-modal="true" aria-label="Card image preview">' +
		'<button id="overlayCloseButton" class="image-close-btn" type="button" aria-label="Close preview">\u00d7</button>' +
		'<button id="carouselPrev" class="carousel-arrow prev" type="button" aria-label="Versi\u00f3n anterior">&#8249;</button>' +
		'<button id="carouselNext" class="carousel-arrow next" type="button" aria-label="Versi\u00f3n siguiente">&#8250;</button>' +
		'<img id="overlayImage" class="image-overlay-content" alt="Card preview" />' +
		'<div id="overlayCaption" class="overlay-caption"></div>' +
		'<div id="versionSetLabel" class="version-set-label"></div>' +
		'<div id="carouselCounter" class="carousel-counter"></div>' +
		'<div class="modal-actions">' +
		'<button id="overlayAddButton" class="modal-add-btn" type="button">+ A\u00f1adir a Lista</button>' +
		'</div>' +
		'</div>';
	document.body.appendChild(imageOverlay);

	var cardSearchInput = document.getElementById("cardSearchInput");
	var cardList = document.getElementById("cardList");
	var cardCount = document.getElementById("cardCount");
	var clearSearchButton = document.getElementById("clearSearchButton");
	var selectedCardsContainer = document.getElementById("selectedCardsContainer");
	var clearAllButton = document.getElementById("clearAllButton");
	var exportOutput = document.getElementById("exportOutput");
	var overlayImage = document.getElementById("overlayImage");
	var overlayCaption = document.getElementById("overlayCaption");
	var overlayCloseButton = document.getElementById("overlayCloseButton");
	var overlayAddButton = document.getElementById("overlayAddButton");
	var carouselPrev = document.getElementById("carouselPrev");
	var carouselNext = document.getElementById("carouselNext");
	var carouselCounter = document.getElementById("carouselCounter");
	var versionSetLabel = document.getElementById("versionSetLabel");
	var overlayCloseTimer = null;
	var currentSearchResultsCache = [];
	var overlayActiveCard = null;
	var carouselVersions = [];
	var carouselIndex = 0;

	function getSellerDisplayName(sellerKey) { return sellerUserMap[sellerKey] || sellerKey; }

	function closeImageOverlay() {
		if (!imageOverlay.classList.contains("open")) return;
		imageOverlay.classList.remove("open");
		imageOverlay.classList.add("closing");
		if (overlayCloseTimer) clearTimeout(overlayCloseTimer);
		overlayCloseTimer = setTimeout(function () {
			imageOverlay.classList.remove("closing");
			overlayImage.removeAttribute("src");
			overlayCaption.textContent = "";
		}, 230);
	}

	function updateCarouselView() {
		if (!carouselVersions.length) return;
		var v = carouselVersions[carouselIndex];
		overlayImage.src = v.normalUrl;
		versionSetLabel.textContent = v.setName + " #" + v.collectorNumber + (v.lang ? " [" + v.lang.toUpperCase() + "]" : "");
		carouselCounter.textContent = (carouselIndex + 1) + " / " + carouselVersions.length;
		carouselPrev.disabled = false;
		carouselNext.disabled = false;
	}

	function loadCardVersions(englishName, currentSrc) {
		carouselVersions = [];
		carouselIndex = 0;
		carouselCounter.textContent = "";
		versionSetLabel.textContent = "";
		carouselPrev.disabled = true;
		carouselNext.disabled = true;
		var url = "https://api.scryfall.com/cards/search?q=!" + encodeURIComponent('"' + englishName + '"') + "&unique=prints&order=released";
		fetch(url)
			.then(function (r) { return r.ok ? r.json() : Promise.reject(); })
			.then(function (data) {
				if (!data.data || !data.data.length) return;
				data.data.forEach(function (print) {
					var normalUrl = (print.image_uris && print.image_uris.normal) ||
						(print.card_faces && print.card_faces[0].image_uris && print.card_faces[0].image_uris.normal) || "";
					if (!normalUrl) return;
					carouselVersions.push({
						normalUrl: normalUrl,
						setName: print.set_name || print.set || "",
						setCode: print.set || "",
						collectorNumber: print.collector_number || "",
						lang: print.lang || "",
						scryfallId: print.id || ""
					});
				});
				if (!carouselVersions.length) return;
				var startIndex = 0;
				for (var i = 0; i < carouselVersions.length; i++) {
					if (carouselVersions[i].normalUrl === currentSrc) { startIndex = i; break; }
				}
				carouselIndex = startIndex;
				updateCarouselView();
			})
			.catch(function () {
				carouselCounter.textContent = "";
				versionSetLabel.textContent = "";
			});
	}

	carouselPrev.addEventListener("click", function (e) {
		e.stopPropagation();
		if (!carouselVersions.length) return;
		carouselIndex = (carouselIndex - 1 + carouselVersions.length) % carouselVersions.length;
		updateCarouselView();
	});

	carouselNext.addEventListener("click", function (e) {
		e.stopPropagation();
		if (!carouselVersions.length) return;
		carouselIndex = (carouselIndex + 1) % carouselVersions.length;
		updateCarouselView();
	});

	function openImageOverlay(src, altText, captionText, cardObj) {
		if (!src) return;
		if (overlayCloseTimer) clearTimeout(overlayCloseTimer);
		imageOverlay.classList.remove("closing");
		overlayImage.src = src;
		overlayImage.alt = altText || "Card image";
		overlayCaption.textContent = captionText || (altText || "");
		overlayActiveCard = cardObj || null;
		var typeKey = cardObj ? getCardTypeKey(cardObj.typeLine || "") : "";
		if (typeKey) { imageOverlay.setAttribute("data-type", typeKey); }
		else { imageOverlay.removeAttribute("data-type"); }
		carouselVersions = [];
		carouselIndex = 0;
		carouselCounter.textContent = "";
		versionSetLabel.textContent = "";
		carouselPrev.disabled = true;
		carouselNext.disabled = true;
		var engName = cardObj ? (cardObj.englishName || cardObj.display || "") : (altText || "");
		if (engName) loadCardVersions(engName, src);
		imageOverlay.classList.add("open");
	}

	imageOverlay.addEventListener("click", function (event) {
		if (event.target === imageOverlay) closeImageOverlay();
	});

	document.addEventListener("keydown", function (event) {
		if (!imageOverlay.classList.contains("open")) return;
		if (event.key === "Escape") { closeImageOverlay(); }
		else if (event.key === "ArrowLeft") { if (carouselVersions.length) { carouselIndex = (carouselIndex - 1 + carouselVersions.length) % carouselVersions.length; updateCarouselView(); } }
		else if (event.key === "ArrowRight") { if (carouselVersions.length) { carouselIndex = (carouselIndex + 1) % carouselVersions.length; updateCarouselView(); } }
	});

	overlayCloseButton.addEventListener("click", function (event) {
		event.stopPropagation();
		closeImageOverlay();
	});

	overlayAddButton.addEventListener("click", function (event) {
		event.stopPropagation();
		if (overlayActiveCard) {
			var version = carouselVersions[carouselIndex] || null;
			selectedCards.push({
				name: overlayActiveCard.display,
				englishName: overlayActiveCard.englishName,
				seller: sellerOptions[0],
				quantity: 1,
				versionSet: version ? version.setName : "",
				versionCode: version ? version.setCode : "",
				versionNumber: version ? version.collectorNumber : "",
				versionLang: version ? version.lang : "",
				versionImageUrl: version ? version.normalUrl : (overlayActiveCard.imageUrl || "")
			});
			renderSelectedCards();
			closeImageOverlay();
		}
	});

	function getCardmarketUrl(card) {
		var baseName = card.englishName || card.display || "";
		var slug = baseName.toString().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
			.replace(/['".,]/g,"").replace(/[^a-zA-Z0-9]+/g,"-").replace(/^-+|-+$/g,"");
		return "https://www.cardmarket.com/en/Magic/Cards/" + slug + "?sellerCountry=10&sellerType=1,2&language=1,4";
	}

	function getSellerOfferUrl(sellerKey, cardName, lang) {
		var sellerUser = sellerUserMap[sellerKey] || sellerKey;
		return "https://www.cardmarket.com/en/Magic/Users/" + encodeURIComponent(sellerUser) + "/Offers/Singles?name=" + encodeURIComponent(cardName || "") + "&sortBy=price_asc&idLanguage=" + (lang || "1");
	}

	function getPriceLabel(card) {
		if (card.priceEur) return card.priceEur.replace(".",",") + " EUR";
		if (card.priceUsd) return card.priceUsd + " USD";
		return "Ver precio";
	}

	function buildPriceLink(card) {
		var anchor = document.createElement("a");
		anchor.className = "price-link";
		anchor.href = getCardmarketUrl(card);
		anchor.rel = "noopener noreferrer";
		anchor.target = "_blank";
		anchor.title = "Comprar en Cardmarket";
		anchor.innerHTML =
			'<img src="https://cdn-icons-png.flaticon.com/512/181/181598.png" alt="Cart" style="width:14px;height:14px;filter:brightness(1)invert(0.7);" />' +
			"<span>" + getPriceLabel(card) + "</span>";
		anchor.addEventListener("click", function (event) { event.stopPropagation(); });
		return anchor;
	}

	function renderSearchEmpty(text) {
		cardList.innerHTML = "";
		var emptyItem = document.createElement("li");
		emptyItem.className = "card-item-empty";
		emptyItem.textContent = text;
		cardList.appendChild(emptyItem);
	}

	function getCardImageUrl(card) {
		if (card.image_uris && card.image_uris.normal) return card.image_uris.normal;
		if (card.card_faces && card.card_faces.length) {
			var f = card.card_faces[0];
			if (f.image_uris && f.image_uris.normal) return f.image_uris.normal;
		}
		return "";
	}

	function getCardArtCropUrl(card) {
		if (card.image_uris && card.image_uris.art_crop) return card.image_uris.art_crop;
		if (card.card_faces && card.card_faces.length) {
			var f = card.card_faces[0];
			if (f.image_uris && f.image_uris.art_crop) return f.image_uris.art_crop;
		}
		return "";
	}

	function renderSearchResults(results) {
		cardList.innerHTML = "";
		currentSearchResultsCache = results;
		cardCount.textContent = results.length ? (results.length + " results") : "";
		if (!results.length) { renderSearchEmpty("No results found."); return; }

		results.sort(function (a, b) {
			return a.display.localeCompare(b.display, "en", { sensitivity: "base" });
		});

		results.forEach(function (card) {
			var item = document.createElement("li");
			item.className = "card-item" + (activePreviewKey === card.searchKey ? " active" : "");
			item.title = card.subtitle || "";
			var typeKey = getCardTypeKey(card.typeLine || "");
			if (typeKey) item.setAttribute("data-type", typeKey);
			if (card.artCropUrl) {
				item.style.backgroundImage = "linear-gradient(rgba(8,14,26,0.72), rgba(8,14,26,0.82)), url('" + card.artCropUrl + "')";
				item.style.backgroundSize = "cover";
				item.style.backgroundPosition = "center";
			}
			item.addEventListener("click", function () {
				activePreviewKey = card.searchKey;
				openImageOverlay(card.imageUrl, card.display, card.display, card);
				renderSearchResults(results);
			});

			var row = document.createElement("div");
			row.className = "card-item-row";
			var text = document.createElement("span");
			text.className = "card-item-name";
			text.textContent = card.display;
			row.appendChild(text);
			item.appendChild(row);

			if (card.subtitle) {
				var subtitle = document.createElement("div");
				subtitle.className = "sidebar-help card-item-subtitle";
				subtitle.textContent = card.subtitle;
				item.appendChild(subtitle);
			}

			var bottomRow = document.createElement("div");
			bottomRow.className = "card-bottom-row";
			var addButton = document.createElement("button");
			addButton.className = "clear-selection add-inline";
			addButton.type = "button";
			addButton.textContent = "Añadir";
			addButton.addEventListener("click", function (event) {
				event.stopPropagation();
				selectedCards.push({ name:card.display, englishName:card.englishName, seller:sellerOptions[0], quantity:1 });
				renderSelectedCards();
			});
			bottomRow.appendChild(buildPriceLink(card));
			bottomRow.appendChild(addButton);
			item.appendChild(bottomRow);
			cardList.appendChild(item);
		});
	}

	function buildScryfallQuery(rawText) {
		return "name:\"" + escapeQuotes(rawText.replace(/\s+/g," ").trim()) + "\"";
	}

	function getCardTypeKey(typeLine) {
		var t = typeLine.toLowerCase();
		if (t.indexOf("artifact") !== -1) return "artifact";
		if (t.indexOf("land") !== -1) return "land";
		if (t.indexOf("planeswalker") !== -1) return "planeswalker";
		if (t.indexOf("battle") !== -1) return "battle";
		if (t.indexOf("enchantment") !== -1) return "enchantment";
		if (t.indexOf("instant") !== -1) return "instant";
		if (t.indexOf("sorcery") !== -1) return "sorcery";
		if (t.indexOf("creature") !== -1) return "creature";
		return "";
	}

	function dedupeResults(cards) {
		var seen = {};
		var output = [];
		cards.forEach(function (card) {
			var display = card.name || card.printed_name;
			if (!display) return;
			var key = normalizeText(display + "|" + (card.name || ""));
			if (seen[key]) return;
			seen[key] = true;
			output.push({
				display: display,
				englishName: card.name || display,
				subtitle: card.printed_name && card.printed_name !== display ? ("Printed: " + card.printed_name) : "",
				imageUrl: getCardImageUrl(card),
				artCropUrl: getCardArtCropUrl(card),
				priceEur: card.prices && card.prices.eur ? card.prices.eur : "",
				priceUsd: card.prices && card.prices.usd ? card.prices.usd : "",
				typeLine: card.type_line || "",
				searchKey: key
			});
		});
		return output;
	}

	function fetchScryfallCards(value) {
		var trimmed = value.replace(/\s+/g," ").trim();
		if (trimmed.length < 2) {
			cardCount.textContent = "";
			renderSearchEmpty("Type at least 2 characters.");
			return;
		}
		var requestId = ++lastRequestId;
		cardCount.textContent = "Searching...";
		var url = "https://api.scryfall.com/cards/search?q=" + encodeURIComponent(buildScryfallQuery(trimmed)) + "&order=name&unique=cards&include_multilingual=true";
		fetch(url)
			.then(function (response) {
				if (!response.ok) throw new Error("Scryfall no responde");
				return response.json();
			})
			.then(function (payload) {
				if (requestId !== lastRequestId) return;
				renderSearchResults(dedupeResults(Array.isArray(payload.data) ? payload.data : []).slice(0,80));
			})
			.catch(function () {
				if (requestId !== lastRequestId) return;
				cardCount.textContent = "";
				renderSearchEmpty("Could not query Scryfall.");
			});
	}

	function buildSellerSelect(index, selectedSeller) {
		var select = document.createElement("select");
		select.className = "card-search seller-select";
		sellerOptions.forEach(function (seller) {
			var option = document.createElement("option");
			option.value = seller;
			option.textContent = getSellerDisplayName(seller);
			if (seller === selectedSeller) option.selected = true;
			select.appendChild(option);
		});
		select.addEventListener("change", function () {
			selectedCards[index].seller = select.value;
			renderSelectedCards();
		});
		return select;
	}

	function buildQuantityInput(index, selectedQuantity) {
		var select = document.createElement("select");
		select.className = "quantity-select";
		for (var q = 0; q <= 20; q++) {
			var opt = document.createElement("option");
			opt.value = q;
			opt.textContent = q;
			if (q === (selectedQuantity || 1)) opt.selected = true;
			select.appendChild(opt);
		}
		select.addEventListener("change", function () {
			selectedCards[index].quantity = parseInt(select.value, 10);
		});
		return select;
	}

	function buildPriceInput(index, selectedPrice) {
		var wrapper = document.createElement("div");
		wrapper.className = "price-wrapper";
		var input = document.createElement("input");
		input.className = "price-input";
		input.type = "number";
		input.min = "0";
		input.step = "0.01";
		input.placeholder = "Precio";
		input.value = selectedPrice != null ? selectedPrice : "";
		input.addEventListener("input", function () {
			var val = parseFloat(input.value);
			selectedCards[index].price = (!isNaN(val) && val >= 0) ? val : null;
		});
		input.addEventListener("keydown", function (e) {
			if (e.key === "Enter") { e.preventDefault(); appendEntryToFinalList(selectedCards[index]); }
		});
		var symbol = document.createElement("span");
		symbol.className = "price-symbol";
		symbol.textContent = "\u20AC";
		wrapper.appendChild(input);
		wrapper.appendChild(symbol);
		return wrapper;
	}

	function appendEntryToFinalList(entry) {
		var sellerKey = entry.seller;
		var cardLabel = (entry.englishName || entry.name || "").toLowerCase();
		var priceVal = (entry.price != null) ? String(entry.price) : "";
		var cardKey = normalizeText(entry.englishName || entry.name) + "|" + priceVal;
		if (!finalListBySeller[sellerKey]) finalListBySeller[sellerKey] = {};
		if (!finalListBySeller[sellerKey][cardKey]) {
			finalListBySeller[sellerKey][cardKey] = {
				name: cardLabel,
				quantity: 0,
				price: entry.price != null ? entry.price : null
			};
		}
		finalListBySeller[sellerKey][cardKey].quantity += (entry.quantity || 1);
		renderFinalOutput();
	}

	function renderFinalOutput() {
		var sellerKeys = Object.keys(finalListBySeller);
		if (!sellerKeys.length) { exportOutput.value = ""; return; }
		sellerKeys.sort(function (a, b) {
			return getSellerDisplayName(a).localeCompare(getSellerDisplayName(b), "en", { sensitivity: "base" });
		});
		var blocks = sellerKeys.map(function (sellerKey) {
			var cardMap = finalListBySeller[sellerKey] || {};
			var cardEntries = Object.keys(cardMap).map(function (cardKey) { return cardMap[cardKey]; });
			cardEntries.sort(function (a, b) {
				return a.name.localeCompare(b.name, "en", { sensitivity: "base" });
			});
			var lines = [getSellerDisplayName(sellerKey) + ":"];
			cardEntries.forEach(function (cardEntry) {
				var line = cardEntry.quantity + " " + cardEntry.name;
				if (cardEntry.price != null) line += " = " + String(cardEntry.price).replace(".",",") + " \u20AC";
				lines.push(line);
			});
			return lines.join("\n");
		});
		exportOutput.value = blocks.join("\n<<<<<<<<-_-_->>>>>>>>\n");
	}

	function buildAddToFinalButton(index) {
		var addButton = document.createElement("button");
		addButton.className = "clear-selection add-final";
		addButton.type = "button";
		addButton.textContent = "A\u00F1adir";
		addButton.addEventListener("click", function () { appendEntryToFinalList(selectedCards[index]); });
		return addButton;
	}

	function buildSellerLink(sellerKey, cardNameForUrl, lang, label) {
		var link = document.createElement("a");
		link.className = "price-link";
		link.href = getSellerOfferUrl(sellerKey, cardNameForUrl, lang);
		link.rel = "noopener noreferrer";
		link.target = "_blank";
		link.textContent = label || "Abrir oferta";
		return link;
	}

	function createSelectedCardRow(entry, index) {
		var row = document.createElement("div");
		row.className = "card-item selected-card-row";
		var title = document.createElement("div");
		title.className = "selected-card-title";
		title.textContent = (index + 1) + ". " + entry.name;
		var sub = document.createElement("div");
		sub.className = "sidebar-help selected-card-sub";
		sub.textContent = entry.englishName !== entry.name ? ("EN: " + entry.englishName) : "";
		var removeButton = document.createElement("button");
		removeButton.className = "card-item-remove-btn";
		removeButton.type = "button";
		removeButton.textContent = "\u00D7";
		removeButton.addEventListener("click", function () {
			selectedCards.splice(index, 1);
			renderSelectedCards();
		});
		row.appendChild(removeButton);
		row.appendChild(title);
		if (sub.textContent) row.appendChild(sub);
		var controls = document.createElement("div");
		controls.className = "card-row-controls";
		controls.appendChild(buildSellerSelect(index, entry.seller));
		var qtyPriceRow = document.createElement("div");
		qtyPriceRow.className = "qty-price-row";
		qtyPriceRow.appendChild(buildQuantityInput(index, entry.quantity));
		qtyPriceRow.appendChild(buildPriceInput(index, entry.price != null ? entry.price : null));
		controls.appendChild(qtyPriceRow);
		row.appendChild(controls);
		var cardNameForUrl = entry.englishName || entry.name;
		var sellerDisplay = sellerUserMap[entry.seller] || entry.seller;
		var offerInline = document.createElement("div");
		offerInline.className = "offer-inline";
		offerInline.appendChild(buildSellerLink(entry.seller, cardNameForUrl, "1", "Abrir " + sellerDisplay + " oferta (Ingl\u00E9s)"));
		offerInline.appendChild(buildSellerLink(entry.seller, cardNameForUrl, "4", "Abrir " + sellerDisplay + " oferta (Espa\u00F1ol)"));
		offerInline.appendChild(buildAddToFinalButton(index));
		row.appendChild(offerInline);
		return row;
	}

	function renderSelectedCards() {
		selectedCardsContainer.innerHTML = "";
		if (!selectedCards.length) {
			selectedCardsContainer.innerHTML = '<p class="sidebar-help">No cards added yet.</p>';
			return;
		}
		selectedCards.forEach(function (entry, index) {
			selectedCardsContainer.appendChild(createSelectedCardRow(entry, index));
		});
	}

	cardSearchInput.addEventListener("input", function () {
		if (searchDebounce) clearTimeout(searchDebounce);
		searchDebounce = setTimeout(function () { fetchScryfallCards(cardSearchInput.value || ""); }, 300);
	});

	clearSearchButton.addEventListener("click", function () {
		cardSearchInput.value = "";
		cardCount.textContent = "";
		renderSearchEmpty("Type a card name in English to search.");
	});

	clearAllButton.addEventListener("click", function () {
		selectedCards = [];
		finalListBySeller = {};
		exportOutput.value = "";
		renderSelectedCards();
	});

	renderSearchEmpty("Type a card name in English to search.");
	renderSelectedCards();
})();
</script>
</body>
</html>
